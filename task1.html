<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探究任务1：班级购买绿萝的费用问题</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 15px;
            color: #4a5568;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 99px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #48bb78;
            width: 25%;
            transition: width 0.4s;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid #4299e1;
        }

        .card-title {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2d3748;
        }

        .guide {
            background: #f0f7ff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            color: #2c5282;
            line-height: 1.6;
            border-left: 3px solid #4299e1;
        }

        .question {
            background: #fffbf2;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 16px;
            border: 1px solid #fddba8;
        }

        .num {
            display: inline-block;
            min-width: 32px;
            text-align: center;
            padding: 4px 8px;
            margin: 0 2px;
            background: #fff;
            border: 2px solid #f6ad55;
            border-radius: 6px;
            color: #dd6b20;
            font-weight: bold;
            cursor: text;
            user-select: none;
            transition: border 0.2s;
        }

        .num:focus {
            outline: none;
            border-color: #ed8936;
            background: #fff8e6;
        }

        .think-box {
            margin: 16px 0;
        }

        .think-box textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 8px;
            margin-bottom: 8px;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-blue {
            background: #4299e1;
            color: white;
        }

        .btn-blue:hover {
            background: #3182ce;
        }

        .btn-green {
            background: #48bb78;
            color: white;
        }

        .btn-green:hover {
            background: #38a169;
        }

        .btn-orange {
            background: #ed8936;
            color: white;
        }

        .btn-orange:hover {
            background: #dd6b20;
        }

        .answer {
            margin-top: 18px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 8px;
            display: none;
            line-height: 1.7;
            border: 1px solid #e2e8f0;
            z-index: 1;
        }

        .answer strong {
            color: #e53e3e;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1>一元二次方程探究式学习任务单 - 探究任务1</h1>
        <p>基于实际问题 · 理解核心知识点 · AI辅助探究学习</p>
    </div>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="card" id="task1">
        <div class="card-title">探究任务1：班级购买绿萝的费用问题</div>
        <div class="guide">
            💡 <strong>知识点引导</strong>：通过“单价×数量=总价”的实际关系，掌握一元二次方程的列写方法，理解根的判别式判断解的个数的实际意义。<br>
            ✏️ 可点击题目中橙色数字修改数值，观察判别式的变化规律。
        </div>
        <div class="question" id="q1">
            班级计划用班费购买绿萝美化绿植角。经调查发现：若每盆绿萝的单价为x元，则可购买(<span class="num" contenteditable="true" data-task="1" data-index="0">8</span>−x)盆。若班级恰好花费<span class="num" contenteditable="true" data-task="1" data-index="1">15</span>元购买绿萝。
            <br><br>
            (1) 列出关于x的一元二次方程，并整理为一般形式；<br>
            (2) 判断是否存在两种不同的单价，都能让班级刚好花费<span class="num" contenteditable="true" data-task="1" data-index="2">15</span>元购买绿萝。
        </div>
        <div class="think-box">
            <textarea placeholder="💭 思考记录：
1. 我是如何根据“单价×数量=总价”列出方程的？
2. 判断解的个数时，我用到了哪个知识点（判别式）？
3. 修改题目中的数字后，判别式的结果有什么变化？"></textarea>
        </div>
        <button class="btn btn-blue" id="ansBtn1">查看答案与解析</button>
        <button class="btn btn-green" onclick="saveTask(1)">保存探究笔记</button>
        <button class="btn-orange btn" onclick="captureTask(1)">📷 截图提交作业</button>
        <div class="answer" id="answer1"></div>
    </div>
</div>

<script>
    function formatNumber(n) {
        if (isNaN(n) || !isFinite(n) || n === '') return 0;
        return Math.round(Number(n) * 100) / 100;
    }

    function getTaskNumbers(taskId) {
        const nums = [];
        document.querySelectorAll(`.num[data-task="${taskId}"]`).forEach(el => {
            nums.push(formatNumber(el.innerText.trim()));
        });
        return nums;
    }

    function showAnswer(taskId) {
        if (showAnswer.lock) return;
        showAnswer.lock = true;
        
        document.querySelectorAll('.num').forEach(el => el.blur());
        
        const answerBox = document.getElementById(`answer${taskId}`);
        if (!answerBox) {
            showAnswer.lock = false;
            return;
        }
        answerBox.style.display = 'block';
        answerBox.innerHTML = '<div style="color:#9f7aea;">🔄 正在计算答案...</div>';

        setTimeout(() => {
            const nums = getTaskNumbers(taskId);
            let html = '', tip = '';

            if (taskId === 1) {
                const [base, cost1, cost2] = nums;
                const a = 1, b = -base, c = cost1;
                const delta = formatNumber(b*b - 4*a*c);
                html = `<strong>【探究任务1 答案与解析】</strong><br><br>
                (1) 列方程：x(${base}−x) = ${cost1}<br>
                整理为一般形式：x² − ${base}x + ${cost1} = 0<br><br>
                (2) 判别式计算：Δ = ${base}² − 4×1×${cost1} = ${formatNumber(base*base)} − ${formatNumber(4*cost1)} = ${delta}<br>
                结论：${delta>0 ? '✅ 存在' : '❌ 不存在'}两种不同单价（Δ${delta>0 ? '>0' : '≤0'}，${delta>0 ? '有两个不同实数解' : '无两个不同实数解'}）`;
                tip = "📚 核心知识点：判别式Δ=b²-4ac是判断一元二次方程解的个数的核心工具，Δ>0对应实际问题有两种方案，Δ=0一种方案，Δ<0无方案。";
            }

            answerBox.innerHTML = html + `<br><br>${tip}`;
            showAnswer.lock = false;
        }, 100);
    }

    function saveTask(taskId) {
        const textarea = document.querySelector(`#task${taskId} textarea`);
        const content = textarea.value.trim();
        if (!content) {
            alert('请先填写思考记录再保存！');
            return;
        }
        const key = `math_task_${taskId}`;
        localStorage.setItem(key, content);
        alert(`✅ 任务${taskId}笔记已保存！`);
    }

    function captureTask(taskId) {
        saveTask(taskId);
        const taskEl = document.getElementById(`task${taskId}`);
        html2canvas(taskEl, { scale: 2, useCORS: true }).then(canvas => {
            const a = document.createElement('a');
            a.download = `探究任务${taskId}_${new Date().getTime()}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
            alert(`📸 任务${taskId}截图已下载！`);
        }).catch(() => alert('截图失败，请重试！'));
    }

    window.onload = function() {
        document.getElementById('ansBtn1').addEventListener('click', () => showAnswer(1));
        document.querySelectorAll('.num').forEach(el => {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    el.blur();
                }
            });
        });
    };
</script>
</body>
</html>
